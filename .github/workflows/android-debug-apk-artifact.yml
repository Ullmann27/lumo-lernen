name: Build Android Debug APK Artifact

# QUOTA-HINWEIS: Dieser Workflow wurde frueher automatisch bei
# jedem Push auf main ausgeloest. Heinz' Repo hat die Artifact-Quota
# erreicht ('Failed to CreateArtifact: Artifact storage quota
# has been hit'). Daher ist der Push-Trigger entfernt.
#
# Hauptpfad fuer Heinz' APK ist jetzt release-apk.yml -> GitHub Release:
#   https://github.com/Ullmann27/lumo-lernen/releases/latest
#
# Dieser Workflow laesst sich nur noch MANUELL ausloesen, wenn die
# Artifact-Quota wieder frei ist (laut GitHub alle 6-12 Stunden):
#   GitHub -> Actions -> Build Android Debug APK Artifact
#   -> Run workflow

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --build-number "$GITHUB_RUN_NUMBER"

      - name: Collect APK
        run: |
          set -e
          mkdir -p dist
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            APK_PATH="$(find build -type f -name "*.apk" | sort | head -n 1)"
          fi
          test -n "$APK_PATH"
          test -f "$APK_PATH"
          cp "$APK_PATH" dist/Lumo-Lernen-latest.apk
          cp "$APK_PATH" "dist/Lumo-Lernen-debug-${GITHUB_RUN_NUMBER}.apk"
          sha256sum dist/*.apk > dist/SHA256SUMS.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lumo-Lernen-debug-apk
          path: dist/*
          if-no-files-found: error
          retention-days: 7
