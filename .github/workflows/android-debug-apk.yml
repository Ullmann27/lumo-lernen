name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version (capture)
        run: |
          flutter --version | tee flutter_version.txt
          dart --version 2>&1 | tee -a flutter_version.txt

      - name: Create Android platform if missing
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --org dev.ullmann.lumo .
          fi

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |' "$MANIFEST" || true
            if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
              sed -i '/<manifest /a \    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n    <uses-permission android:name="com.google.android.gms.permission.AD_ID" tools:node="remove"/>' "$MANIFEST"
            fi
            if ! grep -q "android.permission.RECORD_AUDIO" "$MANIFEST"; then
              sed -i '/<manifest /a \    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' "$MANIFEST"
            fi
            if ! grep -q "intent.action.TTS_SERVICE" "$MANIFEST"; then
              sed -i 's|</manifest>|    <queries>\n        <intent>\n            <action android:name="android.intent.action.TTS_SERVICE"/>\n        </intent>\n    </queries>\n</manifest>|' "$MANIFEST"
            fi
          fi

      - name: Patch minSdk to 21
        run: |
          for GRADLE in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$GRADLE" ]; then
              sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/' "$GRADLE" || true
              sed -i 's/minSdk flutter\.minSdkVersion/minSdk 21/' "$GRADLE" || true
              sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/' "$GRADLE" || true
              sed -i 's/minSdkVersion = flutter\.minSdkVersion/minSdkVersion = 21/' "$GRADLE" || true
            fi
          done

      - name: Get dependencies (capture log)
        run: |
          set +e
          flutter pub get 2>&1 | tee pub_get.log
          echo "PUB_GET_EXIT=$?" | tee -a pub_get.log

      - name: Analyze (capture log, never fail step)
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze.log
          echo "ANALYZE_EXIT=$?" | tee -a analyze.log
          exit 0

      - name: Build debug APK (capture log)
        run: |
          set +e
          flutter build apk --debug --build-number "$GITHUB_RUN_NUMBER" 2>&1 | tee build_apk.log
          BUILD_EXIT=$?
          echo "BUILD_APK_EXIT=$BUILD_EXIT" | tee -a build_apk.log
          exit $BUILD_EXIT

      - name: Prepare direct APK download
        if: success()
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk dist/Lumo-Lernen-latest.apk
          cp build/app/outputs/flutter-apk/app-debug.apk "dist/Lumo-Lernen-debug-${GITHUB_RUN_NUMBER}.apk"
          cat > dist/update-info.txt <<EOF
          Lumo Lernen Debug APK
          Commit: ${GITHUB_SHA}
          Build number: ${GITHUB_RUN_NUMBER}
          Branch: ${GITHUB_REF_NAME}
          
          Am Handy diese APK oeffnen. Android aktualisiert die vorhandene App,
          wenn Paketname und Signatur zur installierten App passen.
          EOF

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            flutter_version.txt
            pub_get.log
            analyze.log
            build_apk.log
          if-no-files-found: warn

      - name: Upload APK artifact (zipped by GitHub)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lumo-lernen-debug-apk
          path: |
            dist/Lumo-Lernen-latest.apk
            dist/Lumo-Lernen-debug-${{ github.run_number }}.apk
            dist/update-info.txt
          if-no-files-found: error

      - name: Publish direct latest APK release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete lumo-lernen-debug-latest --yes || true
          git tag -f lumo-lernen-debug-latest "$GITHUB_SHA"
          git push -f origin lumo-lernen-debug-latest
          gh release create lumo-lernen-debug-latest \
            dist/Lumo-Lernen-latest.apk \
            dist/Lumo-Lernen-debug-${GITHUB_RUN_NUMBER}.apk \
            dist/update-info.txt \
            --title "Lumo Lernen Debug Latest" \
            --notes "Automatischer Debug-Build aus Commit ${GITHUB_SHA}. Am Handy die APK direkt oeffnen. Android zeigt Aktualisieren, wenn Paketname und Signatur passen." \
            --prerelease
