name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.0'
          cache: true

      - name: Flutter version
        run: flutter --version

      # ── Android platform scaffold ──────────────────────────
      - name: Create Android platform if missing
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --org dev.ullmann.lumo .
          fi

      # ── Manifest patches ───────────────────────────────────
      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "xmlns:tools" "$MANIFEST"; then
              sed -i 's|<manifest |<manifest xmlns:tools="http://schemas.android.com/tools" |' "$MANIFEST" || true
            fi
            if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
              sed -i '/<manifest /a \    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n    <uses-permission android:name="com.google.android.gms.permission.AD_ID" tools:node="remove"/>' "$MANIFEST"
            fi
            if ! grep -q "intent.action.TTS_SERVICE" "$MANIFEST"; then
              sed -i 's|</manifest>|    <queries>\n        <intent>\n            <action android:name="android.intent.action.TTS_SERVICE"/>\n        </intent>\n    </queries>\n</manifest>|' "$MANIFEST"
            fi
            echo "=== AndroidManifest.xml ==="
            cat "$MANIFEST"
          fi

      # ── Gradle: minSdk 21 ──────────────────────────────────
      - name: Patch minSdk to 21
        run: |
          for GRADLE in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$GRADLE" ]; then
              sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/' "$GRADLE" || true
              sed -i 's/minSdk flutter\.minSdkVersion/minSdk 21/' "$GRADLE" || true
              sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 21/' "$GRADLE" || true
              sed -i 's/minSdkVersion = flutter\.minSdkVersion/minSdkVersion = 21/' "$GRADLE" || true
              echo "minSdk in $GRADLE:"; grep -E "minSdk" "$GRADLE" || true
            fi
          done

      # ── Flutter pub get ────────────────────────────────────
      - name: Get dependencies
        run: flutter pub get

      # ── Analyze (non-blocking — warnings don't kill the build) ─
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      # ── Build APK ──────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --verbose

      # ── Upload artifact ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lumo-lernen-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
