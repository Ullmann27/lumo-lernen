name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Generate Lumo Lernen MVP
        run: |
          if [ ! -f pubspec.yaml ]; then
            flutter create --platforms=android --project-name lumo_lernen .
          fi
          cat > lib/main.dart <<'DART'
          import 'package:flutter/material.dart';

          void main() => runApp(const LumoApp());

          class LumoApp extends StatelessWidget {
            const LumoApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Lumo Lernen',
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: Colors.orange),
                  useMaterial3: true,
                ),
                home: const LumoHome(),
              );
            }
          }

          class LumoHome extends StatefulWidget {
            const LumoHome({super.key});
            @override
            State<LumoHome> createState() => _LumoHomeState();
          }

          class _LumoHomeState extends State<LumoHome> {
            int page = 0;
            int stars = 12;
            int wrong = 0;
            String note = 'Heute reicht eine kleine Mission.';
            final titles = const [
              'Home', 'Lernen', 'Lumo-Agent', 'Erkennen', 'Check',
              'Bonus', 'Eltern', 'Memory', 'Schutz'
            ];

            @override
            Widget build(BuildContext context) {
              final wide = MediaQuery.sizeOf(context).width >= 700;
              return Scaffold(
                body: SafeArea(
                  child: Container(
                    decoration: const BoxDecoration(
                      gradient: LinearGradient(
                        colors: [Color(0xfffff3cf), Color(0xffe8fff6)],
                      ),
                    ),
                    child: wide ? _wide() : _mobile(),
                  ),
                ),
                bottomNavigationBar: wide ? null : NavigationBar(
                  selectedIndex: page > 4 ? 0 : page,
                  onDestinationSelected: (value) => setState(() => page = value),
                  destinations: const [
                    NavigationDestination(icon: Icon(Icons.home), label: 'Home'),
                    NavigationDestination(icon: Icon(Icons.menu_book), label: 'Lernen'),
                    NavigationDestination(icon: Icon(Icons.chat), label: 'Lumo'),
                    NavigationDestination(icon: Icon(Icons.document_scanner), label: 'Erkennen'),
                    NavigationDestination(icon: Icon(Icons.psychology), label: 'Check'),
                  ],
                ),
              );
            }

            Widget _wide() => Row(
              children: [
                NavigationRail(
                  selectedIndex: page,
                  onDestinationSelected: (value) => setState(() => page = value),
                  labelType: NavigationRailLabelType.all,
                  destinations: const [
                    NavigationRailDestination(icon: Icon(Icons.home), label: Text('Home')),
                    NavigationRailDestination(icon: Icon(Icons.menu_book), label: Text('Lernen')),
                    NavigationRailDestination(icon: Icon(Icons.chat), label: Text('Lumo')),
                    NavigationRailDestination(icon: Icon(Icons.document_scanner), label: Text('Erkennen')),
                    NavigationRailDestination(icon: Icon(Icons.psychology), label: Text('Check')),
                    NavigationRailDestination(icon: Icon(Icons.card_giftcard), label: Text('Bonus')),
                    NavigationRailDestination(icon: Icon(Icons.family_restroom), label: Text('Eltern')),
                    NavigationRailDestination(icon: Icon(Icons.park), label: Text('Memory')),
                    NavigationRailDestination(icon: Icon(Icons.shield), label: Text('Schutz')),
                  ],
                ),
                Expanded(child: _content()),
                SizedBox(width: 260, child: _sidePanel()),
              ],
            );

            Widget _mobile() => _content();

            Widget _content() => ListView(
              padding: const EdgeInsets.all(16),
              children: [
                _card(Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Text(titles[page], style: const TextStyle(fontSize: 32, fontWeight: FontWeight.w900)),
                    const SizedBox(height: 8),
                    Text(note),
                    const SizedBox(height: 16),
                    if (page == 0) _home(),
                    if (page == 1) _learn(),
                    if (page == 2) _agent(),
                    if (page == 3) _recognition(),
                    if (page == 4) _check(),
                    if (page == 5) _bonus(),
                    if (page == 6) _parent(),
                    if (page == 7) _memory(),
                    if (page == 8) _privacy(),
                  ],
                )),
              ],
            );

            Widget _card(Widget child) => Card(
              elevation: 8,
              shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(28)),
              child: Padding(padding: const EdgeInsets.all(18), child: child),
            );

            Widget _sidePanel() => _card(Column(
              children: [
                const Icon(Icons.pets, size: 90, color: Colors.orange),
                Text('★ $stars', style: const TextStyle(fontSize: 26, fontWeight: FontWeight.w900)),
                Text(note, textAlign: TextAlign.center),
              ],
            ));

            Widget _home() => Wrap(spacing: 8, runSpacing: 8, children: [
              ElevatedButton(onPressed: () => setState(() => page = 1), child: const Text('Mission starten')),
              ElevatedButton(onPressed: () => setState(() => page = 3), child: const Text('Aufgabe erkennen')),
              ElevatedButton(onPressed: () => setState(() => page = 2), child: const Text('Lumo fragen')),
              ElevatedButton(onPressed: () => setState(() => page = 5), child: const Text('Bonuszimmer')),
            ]);

            Widget _learn() => Column(
              crossAxisAlignment: CrossAxisAlignment.start,
              children: [
                const Text('18 - 5 = ?', style: TextStyle(fontSize: 38, fontWeight: FontWeight.w900)),
                Text('Fehlversuche: $wrong/3'),
                const Text('Warum empfiehlt Lumo das? Subtraktion bis 20 braucht kurze Wiederholung.'),
                Wrap(spacing: 8, children: [12, 13, 14].map((number) => ElevatedButton(
                  onPressed: () => _answer(number),
                  child: Text('$number', style: const TextStyle(fontSize: 24)),
                )).toList()),
                if (wrong >= 3) const Text('Schritt 1: Starte bei 18. Schritt 2: Gehe 5 zurück. Ergebnis: 13.'),
              ],
            );

            void _answer(int number) {
              setState(() {
                if (number == 13) {
                  stars += 3;
                  wrong = 0;
                  note = 'Fuchsstark! Richtig.';
                } else {
                  wrong += 1;
                  note = wrong >= 3 ? 'Ich erkläre es ruhig Schritt für Schritt.' : 'Fast. Das ist kein Problem.';
                }
              });
            }

            Widget _agent() => Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
              const Text('Sicherer Agent: keine privaten Daten, keine Treffen, keine offenen Internetantworten.'),
              ElevatedButton(onPressed: () => setState(() => note = 'Wir machen es Schritt für Schritt.'), child: const Text('Lernhilfe')),
              ElevatedButton(onPressed: () => setState(() => note = 'Bitte frag Mama, Papa oder einen vertrauten Erwachsenen.'), child: const Text('Private Daten testen')),
            ]);

            Widget _recognition() => Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
              const Text('Erkennt: 12+7, 18-5, Zahlenreihen, Reime und Noten.'),
              ElevatedButton(onPressed: () => setState(() => note = 'Subtraktion erkannt. Confidence 93%.'), child: const Text('18 - 5 erkennen')),
            ]);

            Widget _check() => const Text('Kognitiver Lern-Check: Kein IQ-Test. Nur Förderprofil. Zahlenreihen stark, Merkaufgaben üben.');
            Widget _bonus() => Text('Sterne: $stars. Gutscheine: 1 Eis, Familienfilm, Extra-Geschichte. Demo-PIN 1234.');
            Widget _parent() => const Text('Warum empfiehlt Lumo das? Weil Subtraktion bis 20 kurze Wiederholung braucht.');
            Widget _memory() => const Text('MemoryGraph speichert Skills, Hilfen, Fortschritt und wirksame Erklärarten.');
            Widget _privacy() => const Text('Keine Werbung. Kein offener Kinder-Chat. Foto und Mikrofon nur mit Elternfreigabe.');
          }
          DART
          cat > test/widget_test.dart <<'DART'
          import 'package:flutter_test/flutter_test.dart';
          import 'package:lumo_lernen/main.dart';
          void main() {
            testWidgets('Lumo Lernen starts', (tester) async {
              await tester.pumpWidget(const LumoApp());
              expect(find.text('Home'), findsWidgets);
            });
          }
          DART
          if [ ! -d android ]; then
            flutter create --platforms=android .
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: lumo-lernen-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
