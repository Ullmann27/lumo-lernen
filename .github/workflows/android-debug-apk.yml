name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - fix-v0.3.1-core-stabilization

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android platform if missing
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --org dev.ullmann.lumo .
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --build-number "$GITHUB_RUN_NUMBER"

      - name: Prepare release files
        run: |
          set -e
          mkdir -p dist
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          test -f "$APK_PATH"
          cp "$APK_PATH" dist/Lumo-Lernen-latest.apk
          cp "$APK_PATH" "dist/Lumo-Lernen-debug-${GITHUB_RUN_NUMBER}.apk"
          sha256sum dist/*.apk > dist/SHA256SUMS.txt
          echo "Lumo Lernen Debug APK" > dist/update-info.txt
          echo "Branch: ${GITHUB_REF_NAME}" >> dist/update-info.txt
          echo "Build number: ${GITHUB_RUN_NUMBER}" >> dist/update-info.txt
          echo "Download: https://github.com/${GITHUB_REPOSITORY}/releases/download/debug-latest/Lumo-Lernen-latest.apk" >> dist/update-info.txt

      - name: Publish APK release download
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Lumo Lernen Debug Latest
          body: APK Download fuer aktuellen Debug-Build ohne Actions-Artifact-Speicher.
          prerelease: true
          make_latest: true
          files: dist/*
          fail_on_unmatched_files: true
