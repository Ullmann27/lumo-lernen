name: Apply Reading Guard Patch

on:
  push:
    branches:
      - chore-reading-guard-patcher

permissions:
  contents: write

jobs:
  apply-reading-guard-patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create patch branch
        run: |
          git fetch origin main
          git checkout -B feat-reading-enforce-ai-policy origin/main

      - name: Patch reading_content.dart
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/features/reading/reading_content.dart')
          text = path.read_text(encoding='utf-8')
          original = text

          def fail(message: str) -> None:
              raise SystemExit(message)

          def insert_after_once(source: str, anchor: str, addition: str, label: str) -> str:
              if addition.strip() in source:
                  return source
              index = source.find(anchor)
              if index < 0:
                  fail(f'Patch failed: missing anchor for {label}: {anchor!r}')
              return source[: index + len(anchor)] + addition + source[index + len(anchor):]

          def insert_before_once(source: str, anchor: str, addition: str, label: str) -> str:
              if addition.strip() in source:
                  return source
              index = source.find(anchor)
              if index < 0:
                  fail(f'Patch failed: missing anchor for {label}: {anchor!r}')
              return source[:index] + addition + source[index:]

          # Imports: add only policy files. Local reading components stay untouched.
          text = insert_after_once(
              text,
              "import '../../core/lumo_voice.dart';\n",
              "import '../../core/lumo_ai_learning_access.dart';\nimport '../../core/lumo_ai_policy_guard.dart';\n",
              'AI policy imports',
          )

          # Guard field: do not modify StoryEngine, ReadingTextCleaner, ReadingMonitor,
          # ReadingV2PronunciationAnalyzer, speech listener, repositories, or attempt ledger.
          text = insert_after_once(
              text,
              '  final _attemptLedger = ReadingAttemptLedger();\n',
              '  final _aiPolicyGuard = const LumoAiPolicyGuard();\n',
              'AI policy guard field',
          )

          # Canonical guard check. The local variable names make the required policy gate explicit:
          # guard.allows(settings, LumoAiLearningArea.readingHelp)
          if 'bool get _externalReadingHelpAllowed =>' not in text:
              text = insert_after_once(
                  text,
                  "  static const String _unclearReadingMessage =\n      'Ich habe dich nicht gut verstanden. Das war kein Fehler. Lies bitte nochmal langsam.';\n",
                  "\n  bool get _externalReadingHelpAllowed {\n    final settings = widget.appState.state.settings;\n    final guard = _aiPolicyGuard;\n    return guard.allows(settings, LumoAiLearningArea.readingHelp);\n  }\n\n  String get _readingHelpPolicyMessage =>\n      _aiPolicyGuard.blockedMessageFor(LumoAiLearningArea.readingHelp);\n",
                  'AI reading policy getters',
              )

          # UI notice only. It does not disable local reading flow, pronunciation analysis,
          # cleaner, microphone, syllable UI, or problem-word training.
          if '_ReadingPolicyNotice(message: _readingHelpPolicyMessage)' not in text:
              text = insert_after_once(
                  text,
                  '                _ReadingHeader(title: story.title, onBack: widget.onBack),\n',
                  '                if (!_externalReadingHelpAllowed) ...[\n'
                  '                  const SizedBox(height: 12),\n'
                  '                  _ReadingPolicyNotice(message: _readingHelpPolicyMessage),\n'
                  '                ],\n',
                  'AI reading policy notice call',
              )

          if 'class _ReadingPolicyNotice extends StatelessWidget' not in text:
              text = insert_before_once(
                  text,
                  'class _StoryProgressBar extends StatelessWidget {\n',
                  "class _ReadingPolicyNotice extends StatelessWidget {\n"
                  "  const _ReadingPolicyNotice({required this.message});\n\n"
                  "  final String message;\n\n"
                  "  @override\n"
                  "  Widget build(BuildContext context) {\n"
                  "    return Container(\n"
                  "      width: double.infinity,\n"
                  "      padding: const EdgeInsets.all(14),\n"
                  "      decoration: lumoCard(color: const Color(0xFFFFFBEB)),\n"
                  "      child: Row(crossAxisAlignment: CrossAxisAlignment.start, children: [\n"
                  "        const Icon(Icons.lock_rounded, color: LumoColors.orange),\n"
                  "        const SizedBox(width: 10),\n"
                  "        Expanded(\n"
                  "          child: Text(\n"
                  "            '$message Lokales Mitlesen, Silben, Aussprache-Analyse und Problemworttraining bleiben aktiv.',\n"
                  "            style: LumoTextStyles.body.copyWith(color: LumoColors.ink700, fontWeight: FontWeight.w800),\n"
                  "          ),\n"
                  "        ),\n"
                  "      ]),\n"
                  "    );\n"
                  "  }\n"
                  "}\n\n",
                  'AI reading policy notice widget',
              )

          required = [
              "import '../../core/lumo_ai_learning_access.dart';",
              "import '../../core/lumo_ai_policy_guard.dart';",
              'final _aiPolicyGuard = const LumoAiPolicyGuard();',
              'final settings = widget.appState.state.settings;',
              'final guard = _aiPolicyGuard;',
              'guard.allows(settings, LumoAiLearningArea.readingHelp)',
              '_aiPolicyGuard.blockedMessageFor(LumoAiLearningArea.readingHelp)',
              '_ReadingPolicyNotice(message: _readingHelpPolicyMessage)',
              'class _ReadingPolicyNotice extends StatelessWidget',
              'Lokales Mitlesen, Silben, Aussprache-Analyse und Problemworttraining bleiben aktiv.',
          ]
          missing = [item for item in required if item not in text]
          if missing:
              fail(f'Patch verification failed. Missing: {missing}')

          protected_local_systems = [
              'ReadingV2PronunciationAnalyzer',
              'ReadingTextCleaner',
              'ReadingActiveSentenceView',
              'class _SyllableWord extends StatelessWidget',
              '_monitor.processSentence',
              '_textCleaner.cleanStory',
          ]
          missing_protected = [item for item in protected_local_systems if item not in text]
          if missing_protected:
              fail(f'Protected local reading systems missing after patch: {missing_protected}')

          # No duplicate imports/getters/widgets on reruns.
          singleton_patterns = {
              'lumo_ai_learning_access import': r"import '../../core/lumo_ai_learning_access.dart';",
              'lumo_ai_policy_guard import': r"import '../../core/lumo_ai_policy_guard.dart';",
              'guard field': r'final _aiPolicyGuard = const LumoAiPolicyGuard\(\);',
              'allowed getter': r'bool get _externalReadingHelpAllowed',
              'notice widget': r'class _ReadingPolicyNotice extends StatelessWidget',
          }
          duplicates = [name for name, pattern in singleton_patterns.items() if len(re.findall(pattern, text)) != 1]
          if duplicates:
              fail(f'Patch verification failed. Duplicate or missing singleton elements: {duplicates}')

          if text == original:
              fail('Patch failed: reading_content.dart unchanged')

          path.write_text(text, encoding='utf-8')
          print('Reading AI policy guard patch applied successfully.')
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate Flutter project
        run: |
          flutter pub get
          dart format --set-exit-if-changed lib/features/reading/reading_content.dart
          flutter analyze
          flutter test

      - name: Show patch summary
        run: |
          git diff -- lib/features/reading/reading_content.dart

      - name: Commit and push patch branch
        run: |
          if git diff --quiet -- lib/features/reading/reading_content.dart; then
            echo "No reading guard changes detected."
            exit 1
          fi
          git config user.name "Lumo Bot"
          git config user.email "lumo-bot@users.noreply.github.com"
          git add lib/features/reading/reading_content.dart
          git commit -m "feat(reading): enforce AI policy guard"
          git push --force origin feat-reading-enforce-ai-policy
