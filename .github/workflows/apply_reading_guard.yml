name: Apply Reading Guard Patch

on:
  push:
    branches:
      - chore-reading-guard-patcher
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-reading-guard-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create patch branch
        run: |
          git fetch origin main
          git checkout -B feat-reading-enforce-ai-policy origin/main

      - name: Apply reading patch
        run: python3 .github/scripts/patch_reading_guard.py

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate patched reading guard
        run: |
          flutter pub get
          dart format lib/features/reading/reading_content.dart
          flutter analyze lib/features/reading/reading_content.dart
          flutter test test/lumo_ai_policy_guard_test.dart

      - name: Show patch summary
        run: git diff -- lib/features/reading/reading_content.dart

      - name: Commit and push patch branch
        run: |
          if git diff --quiet -- lib/features/reading/reading_content.dart; then
            echo "No reading guard changes detected."
            exit 1
          fi
          git config user.name "Lumo Bot"
          git config user.email "lumo-bot@users.noreply.github.com"
          git add lib/features/reading/reading_content.dart
          git commit -m "feat(reading): enforce AI policy guard"
          git push --force origin feat-reading-enforce-ai-policy
