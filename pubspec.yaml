name: lumo_lernen
description: Lumo Lernen - Lern-App fuer Volksschulkinder (1. und 2. Klasse Oesterreich)
publish_to: none
version: 0.8.0+9

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  shared_preferences: ^2.3.3
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  url_launcher: ^6.3.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/images/
    - assets/lumo_jump/fox/master/
    - assets/lumo_jump/fox/idle/
    - assets/lumo_jump/fox/run/
    - assets/lumo_jump/fox/jump/
    - assets/lumo_jump/fox/fall/
    - assets/lumo_jump/fox/duck/
    - assets/lumo_jump/fox/roll/
    - assets/lumo_jump/fox/shadow/
    - assets/lumo_kart/kart/
    - assets/lumo_kart/collectibles/
    - assets/lumo_kart/track/
    - assets/lumo_kart/effects/
    - assets/lumo_kart/environment/
    - assets/lumo_sprite_pack/
    - assets/lumo_sprite_pack/walk_right/
    - assets/lumo_sprite_pack/walk_left/
    - assets/lumo_sprite_pack/run/
    - assets/lumo_sprite_pack/cheer/
    - assets/lumo_cards/
    - assets/lumo_cards/cards/red/
    - assets/lumo_cards/cards/yellow/
    - assets/lumo_cards/cards/green/
    - assets/lumo_cards/cards/blue/
    - assets/lumo_cards/cards/special/
    - assets/lumo_cards/cards/back/
    - assets/lumo_cards/ui/
    - assets/lumo_cards/fx/
    - assets/lumo_cards/avatars/
    - assets/lumo_cards/table/
    - assets/audio/sfx/
