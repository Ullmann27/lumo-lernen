name: lumo_lernen
description: Lumo Lernen - Lern-App fuer Volksschulkinder (1. und 2. Klasse Oesterreich)
publish_to: none
version: 0.8.0+9

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  shared_preferences: ^2.3.3
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  just_audio: ^0.9.42
  path_provider: ^2.1.5
  crypto: ^3.0.6
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/images/
    - assets/lumo_jump/fox/master/
    - assets/lumo_jump/fox/idle/
    - assets/lumo_jump/fox/run/
    - assets/lumo_jump/fox/jump/
    - assets/lumo_jump/fox/fall/
    - assets/lumo_jump/fox/duck/
    - assets/lumo_jump/fox/roll/
    - assets/lumo_jump/fox/shadow/
